about_content: | # this will include new lines to allow paragraphs
  Dr. Eng. Tsardoulias Emmanouil is an Assistant Professor of Networks and Unified Digital Communications with the School of Electrical and Computer Engineering at the Aristotle University of Thessaloniki, Greece. His research interests are focused on Systems Engineering, Cyber-Physical Systems, Internet of Things, Networking, and No/Low-code tools and platforms. He has worked as a research associate/engineer in GRNET, the Informatics and Telematics Institute (ITI) of CERTH and the Aristotle University of Thessaloniki (AUTH), in several EU- and National-funded projects. He currently is the technical manager of the Intelligent Systems and Software Engineering group (ISSEL), as well as the scientific responsible for the Vroom research team. His work has been published in over 100 journal articles, book chapters, and conference publications.

